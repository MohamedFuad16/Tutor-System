name: Graphify Refresh

on:
  pull_request:
  push:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  graphify-refresh:
    if: >-
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip graphify]')
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Graphify
        run: python -m pip install --upgrade pip graphifyy

      - name: Refresh Graphify graph
        run: |
          set -euo pipefail
          graphify update .
          graphify tree --graph graphify-out/graph.json --output graphify-out/GRAPH_TREE.html --root . --label Tutor

      - name: Commit graph artifacts
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- graphify-out)" ]; then
            echo "Graphify artifacts are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add graphify-out
          git commit -m "chore: refresh graphify graph [skip graphify]"
          git push
